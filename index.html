<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TAX! — Driver</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    /* Asphalt base with warm undertone + layered glass */
    --bg:#0A0C10; --bg2:#0E1118;
    --glass:rgba(22,26,34,0.72); --glass-hi:rgba(34,40,52,0.66);
    --stroke:rgba(255,255,255,0.07); --stroke-hi:rgba(255,255,255,0.13);
    --amber:#FFB000; --amber-soft:#FFC94D; --amber-glow:rgba(255,176,0,0.45);
    --go:#34D17A; --go-soft:#5BE39A; --go-glow:rgba(52,209,122,0.4);
    --blue:#3E7BFF; --red:#FF5A5A;
    --txt:#F2F5FA; --txt2:#AEB6C4; --txt3:#6B7484;
    --r-lg:22px; --r-md:16px; --r-sm:11px;
    --shadow:0 18px 50px -12px rgba(0,0,0,0.7);
    --ease:cubic-bezier(0.32,0.72,0,1);          /* apple-like spring ease */
    --ease-soft:cubic-bezier(0.4,0,0.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;position:fixed;width:100%;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  #app{width:100%;max-width:440px;height:100dvh;position:relative;display:grid;grid-template-rows:auto 1fr;
    background:radial-gradient(120% 80% at 50% -10%, #12161F 0%, var(--bg) 55%);overflow:hidden;}
  .disp{font-family:'Sora',sans-serif;font-feature-settings:"tnum" 1;letter-spacing:-0.02em;}
  .num{font-variant-numeric:tabular-nums;}

  /* ---- Brand mark ---- */
  .mark{font-family:'Sora';font-weight:800;font-size:19px;color:#0A0C10;background:linear-gradient(135deg,var(--amber-soft),var(--amber));
    padding:2px 9px;border-radius:7px;letter-spacing:-0.04em;box-shadow:0 2px 10px var(--amber-glow);}
  .stripe{display:flex;gap:2px;}
  .stripe i{width:3px;height:16px;border-radius:2px;display:block;opacity:.9;}

  /* ---- Header ---- */
  #hdr{padding:14px 16px 10px;z-index:600;flex-shrink:0;
    background:linear-gradient(180deg,rgba(14,17,24,0.9),rgba(10,12,16,0));backdrop-filter:blur(12px);
    opacity:0;transform:translateY(-12px);animation:fadeDown .6s var(--ease) .05s forwards;}
  .row{display:flex;justify-content:space-between;align-items:flex-start;}
  .logo{display:flex;align-items:center;gap:9px;}
  .name{font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-0.01em;}
  .sub{font-size:11.5px;color:var(--txt3);font-weight:500;}
  .stars{color:var(--amber);font-size:10px;letter-spacing:1px;}
  .earn{font-size:21px;font-weight:800;color:var(--amber);line-height:1;}
  .toggles{display:flex;align-items:center;justify-content:space-between;margin-top:11px;gap:8px;}
  .seg{display:flex;gap:6px;}
  .chip{padding:6px 12px;border-radius:100px;border:1px solid var(--stroke);background:var(--glass);backdrop-filter:blur(16px);
    color:var(--txt2);font-size:11px;font-weight:600;letter-spacing:.2px;cursor:pointer;font-family:inherit;
    display:flex;align-items:center;gap:5px;transition:all .35s var(--ease);}
  .chip:active{transform:scale(.95);}
  .chip.auto.on{background:linear-gradient(135deg,#4d86ff,var(--blue));border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(62,123,255,.4);}
  .duty{display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:100px;border:1px solid var(--stroke-hi);
    background:var(--glass);backdrop-filter:blur(16px);color:var(--go-soft);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
    transition:all .35s var(--ease);}
  .duty:active{transform:scale(.95);}
  .duty.off{color:var(--txt3);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--go);box-shadow:0 0 0 0 var(--go-glow);animation:beacon 2s infinite;}
  .duty.off .dot{background:var(--txt3);animation:none;box-shadow:none;}
  @keyframes beacon{0%{box-shadow:0 0 0 0 var(--go-glow);}70%{box-shadow:0 0 0 7px rgba(52,209,122,0);}100%{box-shadow:0 0 0 0 rgba(52,209,122,0);}}

  /* ---- Map ---- */
  #mapwrap{position:relative;overflow:hidden;}
  #map{position:absolute;inset:0;background:var(--bg);z-index:1;}
  .leaflet-container{background:#0b0d12;font-family:inherit;}
  .leaflet-control-zoom{border:none!important;box-shadow:var(--shadow)!important;border-radius:var(--r-sm)!important;overflow:hidden;}
  .leaflet-control-zoom a{background:var(--glass)!important;backdrop-filter:blur(16px);color:var(--txt)!important;border-color:var(--stroke)!important;}

  /* ---- Markers ---- */
  .taxi-mk{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--amber-soft),var(--amber));border:2.5px solid rgba(255,255,255,.9);border-radius:11px;
    box-shadow:0 6px 18px var(--amber-glow),inset 0 1px 2px rgba(255,255,255,.4);font-size:18px;transition:transform .12s linear;}
  .rider-mk{position:relative;width:36px;height:36px;}
  .rider-mk .body{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--glass-hi);backdrop-filter:blur(8px);
    border:2px solid var(--amber);border-radius:50% 50% 50% 2px;transform:rotate(-45deg);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 14px var(--amber-glow);}
  .rider-mk .body span{transform:rotate(45deg);font-size:14px;}
  .rider-mk.sel .body{background:linear-gradient(135deg,var(--amber-soft),var(--amber));border-color:#fff;}
  .rider-mk .arrow{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:12px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));}
  .rider-mk.detour .body{border-color:var(--blue);box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 14px rgba(62,123,255,.5);}
  .fare-tag{background:rgba(10,12,16,.82);backdrop-filter:blur(10px);border:1px solid var(--stroke-hi);color:var(--amber);
    font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px;font-family:'Sora';white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.4);}
  .dest-mk{width:24px;height:24px;background:linear-gradient(135deg,var(--go-soft),var(--go));border:2.5px solid #fff;border-radius:50%;
    box-shadow:0 4px 12px var(--go-glow);display:flex;align-items:center;justify-content:center;font-size:11px;}
  .detour-mk{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(13,22,42,.85);backdrop-filter:blur(8px);
    border:2px solid var(--blue);border-radius:50% 50% 50% 2px;transform:rotate(-45deg);box-shadow:0 4px 14px rgba(62,123,255,.5);}
  .detour-mk span{transform:rotate(45deg);font-size:14px;color:#8fb0ff;}

  /* ---- The Compteur (signature element) ---- */
  #meter{position:absolute;top:12px;left:50%;transform:translateX(-50%) translateY(-130%);z-index:550;
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);border:1px solid var(--stroke-hi);border-radius:18px;
    padding:11px 18px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.08);
    opacity:0;transition:transform .6s var(--ease),opacity .4s;}
  #meter.show{transform:translateX(-50%) translateY(0);opacity:1;}
  #meter::before{content:"";position:absolute;inset:-1px;border-radius:18px;padding:1px;pointer-events:none;
    background:linear-gradient(135deg,var(--amber-glow),transparent 40%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:0;animation:meterBreath 3.5s var(--ease-soft) infinite;}
  @keyframes meterBreath{0%,100%{opacity:.3;}50%{opacity:.9;}}
  #meter .m-lbl{font-size:8.5px;color:var(--txt3);letter-spacing:2.5px;font-weight:600;}
  #meter .m-fare{font-family:'Sora';font-size:23px;font-weight:800;color:var(--amber);line-height:1.05;letter-spacing:-0.02em;}
  #meter .m-div{width:1px;height:30px;background:var(--stroke-hi);}
  #meter .m-eta{font-size:13px;color:var(--txt2);font-weight:500;}#meter .m-eta b{color:var(--go-soft);font-weight:700;}
  #meter.landing{border-color:rgba(62,123,255,.4);}
  #meter.landing .m-fare{color:#8fb0ff;}

  /* ---- Bottom sheet ---- */
  #sheet{position:absolute;left:0;right:0;bottom:0;z-index:600;padding:40px 14px 18px;max-height:62%;overflow-y:auto;
    overscroll-behavior:contain;-webkit-overflow-scrolling:touch;pointer-events:none;
    background:linear-gradient(180deg,rgba(10,12,16,0),rgba(10,12,16,.55) 30%,var(--bg) 60%);}
  #sheet>*{pointer-events:auto;}
  .card{background:var(--glass);backdrop-filter:blur(28px) saturate(1.3);border:1px solid var(--stroke-hi);border-radius:var(--r-lg);
    padding:18px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.07);
    animation:sheetRise .55s var(--ease);}
  @keyframes sheetRise{from{opacity:0;transform:translateY(28px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  .card.active{border-color:rgba(255,176,0,.3);}
  .grab{width:36px;height:4px;border-radius:100px;background:var(--stroke-hi);margin:-6px auto 14px;}
  .lbl{font-size:10px;color:var(--txt3);letter-spacing:2px;font-weight:600;text-transform:uppercase;}
  .bigfare{font-family:'Sora';font-size:30px;font-weight:800;color:var(--amber);line-height:1;letter-spacing:-0.03em;}
  .legs{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0;}
  .leg{background:rgba(10,12,16,.5);border:1px solid var(--stroke);border-radius:var(--r-md);padding:11px 13px;}
  .leg .dotline{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .leg .dotmark{width:7px;height:7px;border-radius:50%;}
  .leg.p .dotmark{background:var(--amber);box-shadow:0 0 8px var(--amber-glow);}
  .leg.d .dotmark{background:var(--go);box-shadow:0 0 8px var(--go-glow);}
  .typebar{display:flex;gap:7px;margin:12px 0 4px;}
  .tpill{flex:1;text-align:center;padding:7px;border-radius:var(--r-sm);border:1px solid var(--stroke);font-size:11px;font-weight:600;
    letter-spacing:.5px;color:var(--txt3);transition:all .3s var(--ease);}
  .tpill.normal.on{background:rgba(52,209,122,.15);border-color:var(--go);color:var(--go-soft);}
  .tpill.smart.on{background:rgba(62,123,255,.15);border-color:var(--blue);color:#8fb0ff;}
  .tpill.premium.on{background:rgba(255,176,0,.15);border-color:var(--amber);color:var(--amber-soft);}
  .seats{display:flex;gap:5px;align-items:center;}
  .seat{width:16px;height:16px;border-radius:5px;background:var(--stroke-hi);transition:all .4s var(--ease);}
  .seat.full{background:linear-gradient(135deg,var(--amber-soft),var(--amber));box-shadow:0 2px 8px var(--amber-glow);}
  .btn{border:none;border-radius:var(--r-md);font-family:inherit;font-weight:700;cursor:pointer;letter-spacing:.3px;
    transition:transform .2s var(--ease),box-shadow .3s,opacity .3s;font-size:14px;}
  .btn:active{transform:scale(.96);}
  .accept{flex:2;padding:15px;background:linear-gradient(135deg,var(--amber-soft),var(--amber));color:#0A0C10;font-weight:800;
    box-shadow:0 8px 24px var(--amber-glow);}
  .accept:disabled{background:var(--stroke-hi);color:var(--txt3);box-shadow:none;}
  .decline{flex:1;padding:15px;background:rgba(255,255,255,.04);border:1px solid var(--stroke-hi);color:var(--txt2);}
  .complete{width:100%;padding:16px;background:linear-gradient(135deg,var(--amber-soft),var(--amber));color:#0A0C10;font-weight:800;
    box-shadow:0 8px 24px var(--amber-glow);}
  .ride{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--stroke);border-radius:var(--r-md);padding:13px 15px;margin-bottom:9px;
    display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .3s var(--ease);
    animation:sheetRise .5s var(--ease) backwards;}
  .ride:active{transform:scale(.98);border-color:var(--stroke-hi);}
  .compass{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:7px;}
  .compass.fwd{background:rgba(52,209,122,.15);color:var(--go-soft);}
  .compass.det{background:rgba(62,123,255,.15);color:#8fb0ff;}

  /* ---- Popups (detour + landing) ---- */
  .pop{position:absolute;left:14px;right:14px;bottom:16px;z-index:800;border-radius:var(--r-lg);padding:17px;
    backdrop-filter:blur(28px) saturate(1.3);transform:translateY(180%);transition:transform .6s var(--ease);box-shadow:var(--shadow);}
  .pop.show{transform:translateY(0);}
  .pop.detour{background:rgba(13,22,42,.82);border:1px solid rgba(62,123,255,.35);}
  .pop.landing{background:rgba(26,19,5,.82);border:1px solid rgba(255,176,0,.35);}
  .pop-head{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
  .pop.detour .pop-head{color:#8fb0ff;} .pop.landing .pop-head{color:var(--amber-soft);}
  .pop-body{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .pop-act{display:flex;gap:9px;}
  .pskip{flex:1;padding:13px;background:rgba(255,255,255,.04);border:1px solid var(--stroke-hi);color:var(--txt2);}
  .ptake{flex:2;padding:13px;font-weight:800;}
  .pop.detour .ptake{background:linear-gradient(135deg,#5b91ff,var(--blue));color:#fff;box-shadow:0 8px 24px rgba(62,123,255,.4);}
  .pop.landing .ptake{background:linear-gradient(135deg,var(--amber-soft),var(--amber));color:#0A0C10;box-shadow:0 8px 24px var(--amber-glow);}
  .ptimer{height:3px;background:var(--stroke-hi);border-radius:100px;margin-top:12px;overflow:hidden;}
  .pbar{height:100%;width:100%;transform-origin:left;border-radius:100px;}
  .pop.detour .pbar{background:var(--blue);} .pop.landing .pbar{background:var(--amber);}

  /* ---- Toast ---- */
  .toast{position:absolute;top:64px;left:50%;transform:translateX(-50%) translateY(-12px);z-index:999;
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);border:1px solid var(--stroke-hi);color:var(--txt);
    padding:11px 18px;border-radius:100px;font-size:13px;font-weight:500;letter-spacing:.1px;box-shadow:var(--shadow);
    opacity:0;transition:all .4s var(--ease);max-width:86%;text-align:center;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hidden{display:none!important;}
  ::-webkit-scrollbar{width:0;}

  /* ---- Login ---- */
  /* Splash / loading screen */
  #splash{position:absolute;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
    background:radial-gradient(130% 90% at 50% 35%, #14181F 0%, var(--bg) 60%);transition:opacity .5s var(--ease),visibility .5s;}
  #splash.gone{opacity:0;visibility:hidden;}
  .splash-logo{transform:scale(.6);opacity:0;animation:logoPop .7s var(--ease) .1s forwards;}
  .logo-img{display:block;width:auto;}
  .splash-img{height:96px;filter:drop-shadow(0 8px 30px rgba(255,176,0,.3));}
  .header-img{height:30px;}
  .logo-mark{display:flex;align-items:center;gap:10px;justify-content:center;}
  .logo-mark .mark{font-size:34px;padding:4px 14px;border-radius:11px;}
  .logo-mark .stripe i{width:5px;height:30px;}
  .splash-bar{width:140px;height:4px;border-radius:100px;background:var(--stroke-hi);overflow:hidden;
    opacity:0;animation:fadeIn .4s ease .5s forwards;}
  .splash-fill{height:100%;width:0;border-radius:100px;background:linear-gradient(90deg,var(--amber-soft),var(--amber));
    box-shadow:0 0 12px var(--amber-glow);animation:charge 1.4s var(--ease) .55s forwards;}
  .splash-tag{font-size:12px;color:var(--txt3);letter-spacing:1px;opacity:0;animation:fadeIn .5s ease .8s forwards;}
  @keyframes logoPop{0%{transform:scale(.6);opacity:0;}60%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
  @keyframes charge{from{width:0;}to{width:100%;}}

  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="splash">
    <div class="splash-logo">
      <img src="logo-dark.svg" alt="TAX!" class="logo-img splash-img">
    </div>
    <div class="splash-bar"><div class="splash-fill"></div></div>
    <div class="splash-tag">Casablanca · transport agréé</div>
  </div>
  <div id="hdr">
    <div class="row">
      <div class="logo">
        <img src="logo-dark.svg" alt="TAX!" class="logo-img header-img">
        <div style="margin-left:4px;">
          <div class="name">Youssef B.</div>
          <div style="display:flex;gap:8px;"><span class="sub">Petit Taxi · A-2841</span><span class="stars">★★★★★</span></div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="earn disp" id="earn">187 DH</div>
        <div class="sub" id="trips">9 courses</div>
      </div>
    </div>
    <div class="toggles">
      <div class="seg">
        <button class="chip auto" id="autoBtn">✦ Auto-pilote</button>
        <span class="chip" style="cursor:default;"><b id="cnt" style="color:var(--amber)">0</b>&nbsp;à proximité</span>
      </div>
      <button class="duty" id="duty"><span class="dot"></span><span id="dutyTxt">En ligne</span></button>
    </div>
  </div>

  <div id="mapwrap">
  <div id="map"></div>

  <div id="meter">
    <div><div class="m-lbl">COMPTEUR</div><div class="m-fare disp num" id="mFare">0 DH</div></div>
    <div class="m-div"></div>
    <div class="m-eta" id="mEta"></div>
  </div>

  <div id="sheet"></div>
  <div class="toast" id="toast"></div>

  <div class="pop" id="pop">
    <div class="pop-head" id="popHead"></div>
    <div class="pop-body" id="popBody"></div>
    <div class="pop-act">
      <button class="btn pskip" onclick="skipPop()">Ignorer</button>
      <button class="btn ptake" id="popTake" onclick="takePop()">Prendre</button>
    </div>
    <div class="ptimer"><div class="pbar" id="pbar"></div></div>
  </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = 'https://gazieocibfftbstxefyj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhemllb2NpYmZmdGJzdHhlZnlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDAyMDgsImV4cCI6MjA5NjYxNjIwOH0.IrUwdcdCYvKeCoSctJuSPUl1sfZ1U70TRMfkXjW1BAI';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---- Driver session (no login for pilot): auto-assign a driver ----
let ME = null;
async function initDriver(){
  // pick an existing driver, or fall back to a default identity if the table is empty
  let { data } = await sb.from('drivers').select('*').order('created_at',{ascending:true}).limit(1).maybeSingle();
  if(!data){
    const ins = await sb.from('drivers').insert({name:'Youssef B.',taxi_type:'petit',plate:'A-2841',online:true,rating:4.9}).select().single();
    data = ins.data;
  }
  ME = data;
  // reflect identity in the header
  if(ME){
    const nm=document.querySelector('#hdr .name'); if(nm)nm.textContent=ME.name;
    const meta=document.querySelector('#hdr .logo .sub'); 
  }
  const p=state.driverPos||DRIVER_START;
  if(ME) await sb.from('drivers').update({online:true,lat:p[0],lng:p[1],seats_taken:0,last_seen:new Date().toISOString()}).eq('id',ME.id);
  startLocationBroadcast();
}

// dismiss the splash after the logo "charges", then boot the app
function dismissSplash(){
  const sp=document.getElementById('splash');
  if(sp) sp.classList.add('gone');
}

// ---- Broadcast this driver's live GPS to the database ----
let geoWatch = null;
function startLocationBroadcast(){
  if(!navigator.geolocation) return;
  geoWatch = navigator.geolocation.watchPosition(async pos=>{
    const lat=pos.coords.latitude, lng=pos.coords.longitude;
    state.driverPos=[lat,lng];
    if(ME){
      await sb.from('drivers').update({lat,lng,last_seen:new Date().toISOString(),seats_taken:state.active?state.seats:0,online:state.online}).eq('id',ME.id);
      if(state.active && typeof state.active.id==='string'){
        await sb.from('rides').update({driver_lat:lat,driver_lng:lng}).eq('id',state.active.id);
      }
    }
  },err=>{console.warn('GPS denied',err);},{enableHighAccuracy:true,maximumAge:3000});
}

async function getRoute(from,to){
  try{
    const url=`https://router.project-osrm.org/route/v1/driving/${from[1]},${from[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;
    const res=await fetch(url);const d=await res.json();
    if(d.routes&&d.routes[0])return{coords:d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),duration:d.routes[0].duration,distance:d.routes[0].distance};
  }catch(e){}
  return{coords:[from,to],duration:120,distance:1500};
}

let animFrame=null;
function driveAlong(coords,durationMs,onArrive,onProgress,meterBase=0,legKm=0){
  if(routeLine)map.removeLayer(routeLine);
  const dashed=state.phase==="toPickup";
  routeLine=L.polyline(coords,{color:'#FFB000',weight:5,opacity:.8,dashArray:dashed?'2,9':null,lineCap:'round'}).addTo(map);
  let segLens=[],total=0;
  for(let i=0;i<coords.length-1;i++){const d=map.distance(coords[i],coords[i+1]);segLens.push(d);total+=d;}
  let elapsed=0,last=performance.now();const taxiEl=document.getElementById('taxiEl');
  function step(now){
    const dt=now-last;last=now;
    if(!state.paused)elapsed+=dt;          // freeze progress while paused
    let t=Math.min(elapsed/durationMs,1);
    let target=t*total,acc=0,idx=0;
    while(idx<segLens.length&&acc+segLens[idx]<target){acc+=segLens[idx];idx++;}
    if(idx>=segLens.length)idx=segLens.length-1;
    const segT=segLens[idx]?(target-acc)/segLens[idx]:0;
    const a=coords[idx],b=coords[idx+1]||coords[idx];
    const lat=a[0]+(b[0]-a[0])*segT,lng=a[1]+(b[1]-a[1])*segT;
    taxiMarker.setLatLng([lat,lng]);state.driverPos=[lat,lng];
    // push simulated position to the active ride so the rider sees us move
    if(!state.paused && state.active && typeof state.active.id==='string'){
      const tn=performance.now();
      if(tn-(state._lastPush||0)>1500){
        state._lastPush=tn;
        sb.from('rides').update({driver_lat:lat,driver_lng:lng}).eq('id',state.active.id).then(()=>{});
      }
    }
    const ang=Math.atan2(b[1]-a[1],b[0]-a[0])*180/Math.PI;
    if(taxiEl)taxiEl.style.transform=`rotate(${ang-90}deg)`;
    routeLine.setLatLngs(coords.slice(idx));
    const remain=Math.ceil((1-t)*durationMs/1000);
    if(state.phase==="toDrop"){
      const fare=meterBase+legKm*t*DH;
      document.getElementById('mFare').textContent=Math.round(fare)+' DH';
    }
    updateMeterEta(remain);
    if(onProgress&&!state.paused)onProgress(t);
    if(!state.paused)map.panTo([lat,lng],{animate:true,duration:.3});
    if(t<1)animFrame=requestAnimationFrame(step);
    else{if(taxiEl)taxiEl.style.transform='rotate(0deg)';onArrive();}
  }
  animFrame=requestAnimationFrame(step);
}

        if(destMarker)map.removeLayer(destMarker);if(routeLine)map.removeLayer(routeLine);
        finishTrip();
      },(t)=>{
        // IV.3 Smart pooling: only offer a detour that satisfies the time rules
        if(!state.detourOffered&&!state.detour&&state.seats<3&&t>0.4&&t<0.7){
          state.detourOffered=true;
          qualifyDetour(r).then(c=>{ if(c) offerPop('detour',c); });

// ---- Detour qualification (change 4) ----
// Rules, measured in TRAVEL TIME via OSRM:
//  Baseline = current position -> first ride's drop-off.
//  A candidate qualifies if total route [now -> candidate pickup -> ... -> both drops]
//  adds <= 30% over baseline, AND the candidate's drop-off is either:
//    (a) "along the way" — inserting it before the first drop costs <=10% extra time, OR
//    (b) "beyond" — it's naturally reached after the first drop (continue past it).
async function routeTime(a,b){ const r=await getRoute(a,b); return r.duration||(r.distance/8); }
async function qualifyDetour(first){
  const now=state.driverPos, d1=first.dropoff;
  const baseline=await routeTime(now,d1);
  let best=null,bestScore=1e9;
  for(const c of DETOUR_POOL){
    // leg to candidate pickup, then evaluate both orderings of the two drop-offs
    const toPick=await routeTime(now,c.at);
    // option A: pick -> candidate drop -> first drop  (candidate along the way / before)
    const aTime=toPick+await routeTime(c.at,c.dropoff)+await routeTime(c.dropoff,d1);
    // option B: pick -> first drop -> candidate drop  (candidate beyond / after)
    const bTime=toPick+await routeTime(c.at,d1)+await routeTime(d1,c.dropoff);
    const best2=Math.min(aTime,bTime);
    const overhead=(best2-baseline)/baseline;          // total time overhead
    // "along the way" test: candidate drop inserted before first drop, extra vs baseline
    const insertExtra=(await routeTime(c.at,c.dropoff)+await routeTime(c.dropoff,d1)
                       - await routeTime(c.at,d1))/baseline;
    const alongWay = insertExtra<=0.10;
    const beyond   = bTime<=aTime;                      // reached after first drop
    if(overhead<=0.30 && (alongWay||beyond) && overhead<bestScore){
      bestScore=overhead; best={...c, _order:(aTime<=bTime?'before':'after'), _overhead:Math.round(overhead*100)};
    }
  }
  return best;
}

// ---- popups (detour + landing share UI) ----
let popTimer=null;
function offerPop(kind,preChosen){
  let cand;
  if(kind==='detour'){
    cand = preChosen || [...DETOUR_POOL].sort((a,b)=>
      map.distance(a.dropoff,state.active.dropoff)-map.distance(b.dropoff,state.active.dropoff))[0];
  }else{
    cand=LANDING_POOL[Math.floor(Math.random()*LANDING_POOL.length)];

  state.pendingPop=cand;state.popKind=kind;
  const at=cand.at;
  if(popMarker)map.removeLayer(popMarker);
  popMarker=L.marker(at,{icon:L.divIcon({className:'',html:`<div class="detour-mk"><span>＋</span></div>`,iconSize:[30,30],iconAnchor:[15,30]})}).addTo(map);
  const pop=document.getElementById('pop');
  pop.className='pop '+kind;
  document.getElementById('popTake').textContent=kind==='detour'?'Prendre en chemin':'Réserver le prochain';
  document.getElementById('popHead').textContent=kind==='detour'?'Passager sur votre route':'Client près de votre arrivée';
  const shareKm=kind==='detour'?(map.distance(cand.dropoff,state.active.dropoff)/1000).toFixed(1):null;
  const note=kind==='detour'
    ?`→ ${cand.dropName} · ${cand._order==='before'?'sur votre route':'après votre arrivée'}${cand._overhead!=null?` · +${cand._overhead}% temps`:''}`
    :`En attente ${cand.atName} · prêt à votre dépose`;
  document.getElementById('popBody').innerHTML=`
    <div>
      <div style="font-size:18px;font-weight:700;color:var(--txt);">${cand.name}</div>
      <div class="sub" style="margin-top:2px;">📍 ${cand.atName}</div>
      <div style="font-size:11px;color:${kind==='detour'?'#8fb0ff':'var(--amber)'};margin-top:3px;">${note}</div>
      <div style="margin-top:3px;"><span class="stars">${stars(cand.rating)}</span></div>
    </div>
    <div style="text-align:right;"><div class="bigfare" style="font-size:22px;">+${cand.fare} DH</div></div>`;
  pop.classList.add('show');
  state.paused=true;                       // freeze taxi + ETA while deciding
  toast(kind==='detour'?'Passager sur votre trajet — taxi en attente':'Prochain client détecté près de l\'arrivée');
  const bar=document.getElementById('pbar');
  bar.style.transition='none';bar.style.transform='scaleX(1)';
  requestAnimationFrame(()=>{bar.style.transition='transform 12s linear';bar.style.transform='scaleX(0)';});
  clearTimeout(popTimer);popTimer=setTimeout(skipPop,12000);
  // auto-pilot auto-accepts
  if(state.auto)setTimeout(()=>{if(state.pendingPop===cand)takePop();},1400);
}
function hidePop(){document.getElementById('pop').classList.remove('show');clearTimeout(popTimer);}
function skipPop(){
  hidePop();
  if(popMarker){map.removeLayer(popMarker);popMarker=null;}
  state.pendingPop=null;
  state.paused=false;                      // resume current trip
}
function takePop(){
  const cand=state.pendingPop;const kind=state.popKind;
  hidePop();
  if(!cand){state.paused=false;return;}
  state.pendingPop=null;

  if(kind==='detour'){
    // DIVERT NOW: stop current drop-off, go pick up the on-route passenger,
    // then drive both to the (shared) destination.
    if(animFrame)cancelAnimationFrame(animFrame);
    const first=state.active;            // passenger already on board
    state.seats=Math.min(3,state.seats+1);
    state.pooled=cand;                   // remember 2nd passenger
    state.paused=false;
    toast(`Détour — récupération de ${cand.name} (siège ${state.seats}/3)`);

    if(popMarker)map.removeLayer(popMarker);
    if(destMarker)map.removeLayer(destMarker);
    state.phase="toPickup";renderSheet();
    // marker at the new passenger's pickup
    destMarker=L.marker(cand.at,{icon:L.divIcon({className:'',html:'<div class="detour-mk"><span>👤</span></div>',iconSize:[30,30],iconAnchor:[15,30]})}).addTo(map);
    getRoute(state.driverPos,cand.at).then(rt=>{
      driveAlong(rt.coords,5500,()=>{
        if(destMarker)map.removeLayer(destMarker);
        state.seats=state.seats;        // both aboard now
        toast(`${cand.name} à bord — direction ${cand.dropName}`);
        state.phase="toDrop";renderSheet();
        // shared destination: drive to the nearer drop, then the other if needed.
        const stops=orderStops(state.driverPos,first,cand);
        runStops(stops);
      },null,0,0);
    });
    return;
  }
  // landing: queue as the next trip after current completes
  state.detour=cand;
  state.paused=false;
  toast(`Prochaine course sécurisée : ${cand.name}`);
}

// order the two drop-offs by distance from current position (closest first)
function orderStops(from,p1,p2){
  const d1=map.distance(from,p1.dropoff),d2=map.distance(from,p2.dropoff);
  const a={name:p1.name,dropoff:p1.dropoff,dropName:p1.dropName,fare:p1.fare};
  const b={name:p2.name,dropoff:p2.dropoff,dropName:p2.dropName,fare:p2.fare};
  return d1<=d2?[a,b]:[b,a];
}
// drive sequentially through drop-off stops, dropping each passenger
function runStops(stops){
  let i=0;
  function next(){
    if(i>=stops.length){ // all delivered
      if(routeLine)map.removeLayer(routeLine);
      state.pooled=null;
      finishPooled(stops);
      return;
    }
    const stop=stops[i];
    if(destMarker)map.removeLayer(destMarker);
    destMarker=L.marker(stop.dropoff,{icon:L.divIcon({className:'',html:'<div class="dest-mk">🏁</div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map);
    getRoute(state.driverPos,stop.dropoff).then(rt=>{
      driveAlong(rt.coords,Math.max(5000,Math.min(11000,rt.distance*6)),()=>{
        if(destMarker)map.removeLayer(destMarker);
        state.seats=Math.max(1,state.seats-1);
        toast(`${stop.name} déposé${i<stops.length-1?' — passager suivant':''}`);
        i++;next();
      },null,(i*0)+0, rt.distance/1000);
    });
  }
  next();
}
function finishPooled(stops){
  const total=stops.reduce((s,x)=>s+x.fare,0);
  state.earnings+=total;state.trips+=stops.length;
  document.getElementById('earn').textContent=state.earnings+' DH';
  document.getElementById('trips').textContent=state.trips+' courses';
  toast(`+${total} DH — course partagée terminée ✓`);
  hideMeter();state.active=null;state.pooled=null;state.seats=1;state.phase="idle";
  renderMarkers();renderSheet();
  if(state.auto)setTimeout(autoPick,1200);
}
window.skipPop=skipPop;window.takePop=takePop;

function finishTrip(){
  const r=state.active;
  state.earnings+=r.fare;state.trips+=1;
  document.getElementById('earn').textContent=state.earnings+' DH';
  document.getElementById('trips').textContent=state.trips+' courses';
  if(state.detour){
    const d=state.detour;state.detour=null;state.seats=1;
    toast(`${r.name} déposé. Prochain : ${d.name}`);
    if(popMarker){map.removeLayer(popMarker);popMarker=null;}
    hideMeter();showMeter();document.getElementById('mFare').textContent='0 DH';
    const pickupPt=d.at;
    state.active={id:d.id,name:d.name,pickup:pickupPt,pickupName:d.atName,dropoff:d.dropoff,dropName:d.dropName,fare:d.fare,rating:d.rating,type:d.type};
    state.phase="toPickup";renderSheet();
    state.detourOffered=true;state.landingFired=true;
    destMarker=L.marker(pickupPt,{icon:L.divIcon({className:'',html:'<div class="dest-mk">👤</div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map);
    getRoute(state.driverPos,pickupPt).then(rt=>{
      driveAlong(rt.coords,6000,()=>{
        if(destMarker)map.removeLayer(destMarker);
        toast(`${d.name} à bord — direction ${d.dropName}`);
        state.phase="toDrop";renderSheet();
        destMarker=L.marker(d.dropoff,{icon:L.divIcon({className:'',html:'<div class="dest-mk">🏁</div>',iconSize:[22,22],iconAnchor:[11,11]})}).addTo(map);
        getRoute(pickupPt,d.dropoff).then(rt2=>{
          driveAlong(rt2.coords,9000,()=>{
            if(destMarker)map.removeLayer(destMarker);if(routeLine)map.removeLayer(routeLine);
            finishTrip();
          },null,0,rt2.distance/1000);
        });
      });
    });
    return;
  }
  toast(`+${r.fare} DH — Course terminée ✓`);
  if(typeof r.id==='string'){ sb.from('rides').update({status:'completed'}).eq('id',r.id).then(()=>{}); }
  hideMeter();state.active=null;state.phase="idle";renderMarkers();renderSheet();
  loadRides();
  if(state.auto)setTimeout(autoPick,1200);
}

function declineRide(){clearPreview();state.selected=null;renderMarkers();renderSheet();}
function toggleDuty(){if(state.active)return;state.online=!state.online;const d=document.getElementById('duty');d.classList.toggle('off',!state.online);document.getElementById('dutyTxt').textContent=state.online?'En ligne':'Hors ligne';
  if(ME){const p=state.driverPos||DRIVER_START;sb.from('drivers').update({online:state.online,lat:p[0],lng:p[1],seats_taken:0,last_seen:new Date().toISOString()}).eq('id',ME.id).then(()=>{});}
  state.selected=null;renderMarkers();renderSheet();}
document.getElementById('duty').onclick=toggleDuty;

// Auto-pilot (IV.2)
function autoPick(){
  if(!state.auto||state.active||!state.online||state.riders.length===0)return;
  // prefer on-route passengers, highest fare
  const sorted=[...state.riders].sort((a,b)=>(b.onRoute-a.onRoute)||(b.fare-a.fare));
  selectRider(sorted[0]);
  setTimeout(()=>{if(state.selected)acceptRide();},900);
}
document.getElementById('autoBtn').onclick=()=>{
  state.auto=!state.auto;
  document.getElementById('autoBtn').classList.toggle('on',state.auto);
  toast(state.auto?'Auto-Pilot activé — scan automatique':'Auto-Pilot désactivé');
  if(state.auto)autoPick();
};

// ---- sheet ----
function seatHtml(n){let h='<div class="seats">';for(let i=0;i<3;i++)h+=`<div class="seat ${i<n?'full':''}"></div>`;h+='</div>';return h;}
function renderSheet(){
  const s=document.getElementById('sheet');
  document.getElementById('cnt').textContent=state.riders.length;
  if(!state.online){s.innerHTML=`<div class="card" style="text-align:center;padding:32px 18px;"><div class="grab"></div><div style="font-size:36px;opacity:.5;">🌙</div><div style="font-size:16px;margin-top:10px;font-weight:700;">Vous êtes hors ligne</div><div class="sub" style="margin-top:5px;">Passez en ligne pour recevoir des courses.</div></div>`;return;}
  if(state.active){
    const r=state.active;
    const head=state.phase==="toPickup"?'Vers le client':'Client à bord';
    s.innerHTML=`<div class="card active"><div class="grab"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="lbl" style="color:var(--amber-soft);background:rgba(255,176,0,.12);padding:4px 10px;border-radius:100px;display:flex;align-items:center;gap:6px;"><span class="dot" style="background:var(--amber);box-shadow:none;animation:none;width:6px;height:6px;"></span>${head}</div>
        <div class="bigfare" style="font-size:23px;">${r.fare} DH</div>
      </div>
      <div style="font-size:20px;font-weight:700;letter-spacing:-0.01em;">${r.name}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <span class="sub">Capacité</span>${seatHtml(state.seats)}
      </div>
      <div class="legs">
        <div class="leg p"><div class="dotline"><span class="dotmark"></span><span class="lbl">Départ</span></div><div style="font-size:12.5px;font-weight:500;">${r.pickupName}</div></div>
        <div class="leg d"><div class="dotline"><span class="dotmark"></span><span class="lbl">Arrivée</span></div><div style="font-size:12.5px;font-weight:500;">${r.dropName}</div></div>
      </div>
      <div style="text-align:center;color:var(--txt3);font-size:12px;">Trajet en cours · compteur actif</div>
    </div>`;return;
  }
  if(state.selected){
    const r=state.selected;
    s.innerHTML=`<div class="card"><div class="grab"></div>
      <div class="row" style="margin-bottom:10px;">
        <div><div class="lbl">Demande de course</div>
          <div style="font-size:22px;font-weight:700;margin-top:4px;letter-spacing:-0.01em;">${r.name}</div>
          <div style="margin-top:4px;"><span class="stars">${stars(r.rating)}</span><span class="sub"> ${r.rating} · ${r.pax} passager${r.pax>1?'s':''}</span></div>
        </div>
        <div style="text-align:right;"><div class="bigfare">${r.fare} DH</div>
          <span class="compass ${r.onRoute?'fwd':'det'}" style="margin-top:6px;display:inline-block;">${r.onRoute?'➡️ Sur trajet':'↩️ Détour'}</span>
        </div>
      </div>
      <div class="typebar">
        <div class="tpill normal ${r.type==='normal'?'on':''}">Normal</div>
        <div class="tpill smart ${r.type==='smart'?'on':''}">Smart</div>
        <div class="tpill premium ${r.type==='premium'?'on':''}">Premium</div>
      </div>
      <div class="legs">
        <div class="leg p"><div class="dotline"><span class="dotmark"></span><span class="lbl">Départ</span></div><div style="font-size:13px;font-weight:600;">${r.pickupName}</div><div class="sub" style="margin-top:3px;">📍 ${r.repere}${r.repereM<900?` · ${r.repereM} m`:''}</div></div>
        <div class="leg d"><div class="dotline"><span class="dotmark"></span><span class="lbl">Arrivée</span></div><div style="font-size:13px;font-weight:600;">${r.dropName}</div></div>
      </div>
      <div style="display:flex;gap:9px;">
        <button class="btn decline" onclick="declineRide()">Refuser</button>
        <button class="btn accept" onclick="acceptRide()">Accepter la course</button>
      </div>
    </div>`;return;
  }
  if(state.riders.length===0){s.innerHTML=`<div class="card" style="text-align:center;padding:30px 18px;"><div class="grab"></div><div style="font-size:30px;opacity:.5;">🚕</div><div style="margin-top:10px;font-weight:600;">Aucune course pour l'instant</div><div class="sub" style="margin-top:4px;">Les demandes apparaîtront ici dès qu'un client réserve.</div></div>`;return;}
  s.innerHTML=`<div class="lbl" style="margin:0 4px 11px;">${state.riders.length} course${state.riders.length>1?'s':''} à proximité</div>`+
    state.riders.map((r,i)=>`<div class="ride" style="animation-delay:${i*0.05}s" onclick='selectRiderById(${r.id})'>
      <div>
        <div style="font-weight:700;font-size:16px;display:flex;align-items:center;gap:7px;letter-spacing:-0.01em;">${r.name}
          <span class="compass ${r.onRoute?'fwd':'det'}">${r.onRoute?'➡️':'↩️'}</span></div>
        <div class="sub" style="margin-top:3px;">📍 ${r.repere}</div>
        <div style="font-size:11px;color:var(--txt3);margin-top:1px;">→ ${r.dropName} · ${r.pax}👤</div>
      </div>
      <div style="text-align:right;min-width:62px;">
        <div style="font-family:'Sora';font-size:18px;font-weight:800;color:var(--amber);letter-spacing:-0.02em;">${r.fare} DH</div>
        <div style="font-size:10px;color:${typeColor(r.type)};font-weight:600;margin-top:3px;text-transform:capitalize;">${r.type}</div>
      </div></div>`).join('');
}

// ---- LIVE DATA: load ride requests from your Supabase database ----
function dbRowToRider(row){
  // turn a database row into the shape the app's UI expects
  const pr=nearestRepere(row.pickup_lat,row.pickup_lng);
  return {
    id: row.id,
    name: row.rider_name,
    pickup: [row.pickup_lat, row.pickup_lng],
    pickupName: row.pickup_name || 'Pickup',
    repere: pr.name,
    repereM: pr.meters,
    dropoff: [row.drop_lat, row.drop_lng],
    dropName: row.drop_name || 'Destination',
    fare: Number(row.fare) || 0,
    pax: row.pax || 1,
    rating: 4.8,
    trips: 0,
    type: row.ride_type || 'normal',
    onRoute: true
  };
}

async function loadRides(){
  const { data, error } = await sb
    .from('rides')
    .select('*')
    .eq('status','waiting')          // only show rides nobody has accepted yet
    .order('created_at',{ascending:false});
  if(error){ console.error(error); toast('Connexion DB échouée'); return; }
  state.riders = (data||[]).map(dbRowToRider);
  renderMarkers(); renderSheet();
}

// listen for new/changed rides and refresh instantly
sb.channel('rides-live')
  .on('postgres_changes',{event:'*',schema:'public',table:'rides'}, ()=>{
    if(!state.active) loadRides();   // don't disrupt an in-progress trip
  })
  .subscribe();

renderMarkers();renderSheet();
initDriver();
loadRides();                          // pull real data on startup
setTimeout(()=>map.invalidateSize(),120);
window.addEventListener('resize',()=>map.invalidateSize());
// let the logo "charge" (~2s) then reveal the app
setTimeout(dismissSplash,2000);
window.addEventListener('load',()=>setTimeout(dismissSplash,2000));
</script>
