<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TAX! — Rider</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0A0C10; --bg2:#0E1118;
    --glass:rgba(22,26,34,0.72); --glass-hi:rgba(34,40,52,0.66);
    --stroke:rgba(255,255,255,0.07); --stroke-hi:rgba(255,255,255,0.13);
    --amber:#FFB000; --amber-soft:#FFC94D; --amber-glow:rgba(255,176,0,0.45);
    --go:#34D17A; --go-soft:#5BE39A; --go-glow:rgba(52,209,122,0.4);
    --blue:#3E7BFF; --red:#FF5A5A;
    --txt:#F2F5FA; --txt2:#AEB6C4; --txt3:#6B7484;
    --r-lg:22px; --r-md:16px; --r-sm:11px;
    --shadow:0 18px 50px -12px rgba(0,0,0,0.7);
    --ease:cubic-bezier(0.32,0.72,0,1);
    --ease-soft:cubic-bezier(0.4,0,0.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;position:fixed;width:100%;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
  #app{width:100%;max-width:440px;height:100dvh;position:relative;display:grid;grid-template-rows:auto 1fr;
    background:radial-gradient(120% 80% at 50% -10%, #12161F 0%, var(--bg) 55%);overflow:hidden;}
  .disp{font-family:'Sora',sans-serif;font-feature-settings:"tnum" 1;letter-spacing:-0.02em;}
  #hdr{padding:14px 16px;z-index:600;display:flex;align-items:center;gap:9px;
    background:linear-gradient(180deg,rgba(14,17,24,0.9),rgba(10,12,16,0));backdrop-filter:blur(12px);
    opacity:0;transform:translateY(-12px);animation:fadeDown .6s var(--ease) .05s forwards;}
  .mark{font-family:'Sora';font-weight:800;font-size:19px;color:#0A0C10;background:linear-gradient(135deg,var(--amber-soft),var(--amber));
    padding:2px 9px;border-radius:7px;letter-spacing:-0.04em;box-shadow:0 2px 10px var(--amber-glow);}
  .stripe{display:flex;gap:2px;}.stripe i{width:3px;height:16px;border-radius:2px;display:block;opacity:.9;}
  .sub{font-size:11.5px;color:var(--txt3);font-weight:500;}
  #mapwrap{position:relative;overflow:hidden;}
  #map{position:absolute;inset:0;background:var(--bg);}
  .leaflet-container{background:#0b0d12;font-family:inherit;}
  .leaflet-control-zoom{display:none;}
  .me-mk{width:20px;height:20px;background:linear-gradient(135deg,#5b91ff,var(--blue));border:3px solid #fff;border-radius:50%;
    box-shadow:0 4px 14px rgba(62,123,255,.6);position:relative;}
  .me-mk::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(62,123,255,.4);animation:ping 2s var(--ease-soft) infinite;}
  /* direction arrow pointing to drop-off */
  .dir-wrap{position:relative;width:54px;height:54px;display:flex;align-items:center;justify-content:center;}
  .dir-dot{width:18px;height:18px;background:linear-gradient(135deg,#5b91ff,var(--blue));border:3px solid #fff;border-radius:50%;box-shadow:0 4px 14px rgba(62,123,255,.6);position:relative;z-index:2;}
  .dir-dot::after{content:"";position:absolute;inset:-7px;border-radius:50%;border:2px solid rgba(62,123,255,.4);animation:ping 2s var(--ease-soft) infinite;}
  .dir-arrow{position:absolute;top:50%;left:50%;width:54px;height:54px;transform-origin:center;pointer-events:none;}
  .dir-arrow svg{position:absolute;top:-2px;left:50%;transform:translateX(-50%);filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
  @keyframes ping{0%{transform:scale(.6);opacity:1;}100%{transform:scale(1.6);opacity:0;}}
  .taxi-mk{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:30px;
    background:none;border:none;box-shadow:none;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.55)) drop-shadow(0 0 10px var(--amber-glow));
    animation:taxiBob 2.4s var(--ease-soft) infinite;transform-origin:center;}
  @keyframes taxiBob{0%,100%{translate:0 0;}50%{translate:0 -2px;}}
  .taxi-mk::after{content:"";position:absolute;width:34px;height:10px;left:3px;bottom:-3px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(0,0,0,.4),transparent 70%);z-index:-1;animation:taxiShadow 2.4s var(--ease-soft) infinite;}
  @keyframes taxiShadow{0%,100%{transform:scaleX(1);opacity:.5;}50%{transform:scaleX(.85);opacity:.32;}}
  .roam-mk.ghost{font-size:15px;}
  .pin-mk{width:24px;height:24px;background:linear-gradient(135deg,var(--go-soft),var(--go));border:2.5px solid #fff;border-radius:50% 50% 50% 2px;
    transform:rotate(-45deg);box-shadow:0 4px 12px var(--go-glow);}
  #sheet{position:absolute;left:0;right:0;bottom:0;z-index:600;padding:40px 14px 18px;
    background:linear-gradient(180deg,rgba(10,12,16,0),rgba(10,12,16,.55) 30%,var(--bg) 60%);}
  .card{background:var(--glass);backdrop-filter:blur(28px) saturate(1.3);border:1px solid var(--stroke-hi);border-radius:var(--r-lg);
    padding:18px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.07);animation:sheetRise .55s var(--ease);}
  .grab{width:36px;height:4px;border-radius:100px;background:var(--stroke-hi);margin:-6px auto 14px;}
  .lbl{font-size:10px;color:var(--txt3);letter-spacing:2px;font-weight:600;text-transform:uppercase;}
  .field{background:rgba(10,12,16,.5);border:1px solid var(--stroke);border-radius:var(--r-md);padding:13px 14px;margin-top:9px;
    display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .3s var(--ease);}
  .field:active{border-color:var(--stroke-hi);}
  .field .ic{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .field.pickup .ic{background:var(--amber);box-shadow:0 0 8px var(--amber-glow);}
  .field.drop .ic{background:var(--go);box-shadow:0 0 8px var(--go-glow);}
  .field input{background:transparent;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:15px;width:100%;font-weight:500;}
  .field input::placeholder{color:var(--txt3);font-weight:400;}
  .types{display:flex;gap:8px;margin-top:11px;}
  .tp{flex:1;text-align:center;padding:11px 4px;border-radius:var(--r-md);border:1px solid var(--stroke);cursor:pointer;
    transition:all .3s var(--ease);}
  .tp:active{transform:scale(.97);}
  .tp .n{font-size:12px;font-weight:700;letter-spacing:.3px;}
  .tp .p{font-family:'Sora';font-size:13px;font-weight:700;color:var(--txt3);margin-top:3px;}
  .tp.on.normal{border-color:var(--go);background:rgba(52,209,122,.12);} .tp.on.normal .p{color:var(--go-soft);}
  .tp.on.smart{border-color:var(--blue);background:rgba(62,123,255,.12);} .tp.on.smart .p{color:#8fb0ff;}
  .tp.on.premium{border-color:var(--amber);background:rgba(255,176,0,.12);} .tp.on.premium .p{color:var(--amber-soft);}
  .est{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:0 2px;}
  .est .f{font-family:'Sora';font-size:27px;font-weight:800;color:var(--amber);letter-spacing:-0.03em;}
  .btn{width:100%;margin-top:14px;padding:16px;border:none;border-radius:var(--r-md);font-family:inherit;font-weight:800;font-size:15px;
    letter-spacing:.3px;cursor:pointer;background:linear-gradient(135deg,var(--amber-soft),var(--amber));color:#0A0C10;
    box-shadow:0 8px 24px var(--amber-glow);transition:transform .2s var(--ease),opacity .3s;}
  .btn:active{transform:scale(.97);}
  .btn:disabled{background:var(--stroke-hi);color:var(--txt3);box-shadow:none;}
  .btn.cancel{background:rgba(255,90,90,.1);border:1px solid rgba(255,90,90,.35);color:var(--red);box-shadow:none;}
  .status-row{display:flex;align-items:center;gap:11px;margin-bottom:7px;}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 0 var(--amber-glow);animation:beacon 1.8s infinite;}
  .pulse.go{background:var(--go);box-shadow:0 0 0 0 var(--go-glow);}
  @keyframes beacon{0%{box-shadow:0 0 0 0 var(--amber-glow);}70%{box-shadow:0 0 0 8px rgba(255,176,0,0);}100%{box-shadow:0 0 0 0 rgba(255,176,0,0);}}
  .meter-big{font-family:'Sora';font-size:36px;font-weight:800;color:var(--amber);letter-spacing:-0.03em;line-height:1;}
  .toast{position:absolute;top:64px;left:50%;transform:translateX(-50%) translateY(-12px);z-index:999;
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);border:1px solid var(--stroke-hi);color:var(--txt);
    padding:11px 18px;border-radius:100px;font-size:13px;font-weight:500;box-shadow:var(--shadow);
    opacity:0;transition:all .4s var(--ease);max-width:86%;text-align:center;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none!important;}
  ::-webkit-scrollbar{width:0;}
  @keyframes sheetRise{from{opacity:0;transform:translateY(28px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
  /* Splash / loading */
  #splash{position:absolute;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
    background:radial-gradient(130% 90% at 50% 35%, #14181F 0%, var(--bg) 60%);transition:opacity .5s var(--ease),visibility .5s;}
  #splash.gone{opacity:0;visibility:hidden;}
  .splash-logo{transform:scale(.6);opacity:0;animation:logoPop .7s var(--ease) .1s forwards;}
  .logo-img{display:block;width:auto;}
  .splash-img{height:96px;filter:drop-shadow(0 8px 30px rgba(255,176,0,.3));}
  .header-img{height:28px;}
  .logo-mark{display:flex;align-items:center;gap:10px;justify-content:center;}
  .logo-mark .mark{font-size:34px;padding:4px 14px;border-radius:11px;}
  .logo-mark .stripe i{width:5px;height:30px;}
  .splash-bar{width:140px;height:4px;border-radius:100px;background:var(--stroke-hi);overflow:hidden;opacity:0;animation:fadeInR .4s ease .5s forwards;}
  .splash-fill{height:100%;width:0;border-radius:100px;background:linear-gradient(90deg,var(--amber-soft),var(--amber));box-shadow:0 0 12px var(--amber-glow);animation:charge 1.4s var(--ease) .55s forwards;}
  .splash-tag{font-size:12px;color:var(--txt3);letter-spacing:1px;opacity:0;animation:fadeInR .5s ease .8s forwards;}
  @keyframes logoPop{0%{transform:scale(.6);opacity:0;}60%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
  @keyframes charge{from{width:0;}to{width:100%;}}
  @keyframes fadeInR{from{opacity:0;}to{opacity:1;}}

  /* Passenger stepper */
  .paxrow{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding:4px 2px;}
  .stepper{display:flex;align-items:center;gap:14px;background:rgba(10,12,16,.5);border:1px solid var(--stroke);border-radius:100px;padding:5px 8px;}
  .stepper button{width:30px;height:30px;border-radius:50%;border:none;background:var(--glass-hi);color:var(--txt);font-size:18px;font-weight:700;cursor:pointer;transition:transform .15s var(--ease),opacity .2s;}
  .stepper button:active{transform:scale(.9);}
  .stepper button:disabled{opacity:.3;}
  .paxn{font-family:'Sora';font-size:17px;font-weight:700;min-width:14px;text-align:center;}

  /* Review stars */
  .rate{display:flex;gap:8px;justify-content:center;margin:10px 0 14px;}
  .star{font-size:32px;color:var(--stroke-hi);cursor:pointer;transition:transform .2s var(--ease),color .2s;}
  .star:active{transform:scale(1.2);}
  .star.on{color:var(--amber);text-shadow:0 0 14px var(--amber-glow);}

  /* Floating action buttons */
  .fab-stack{position:absolute;right:14px;bottom:calc(34% + 14px);z-index:620;display:flex;flex-direction:column;gap:10px;}
  .fab{width:48px;height:48px;border-radius:50%;border:1px solid var(--stroke-hi);backdrop-filter:blur(20px) saturate(1.3);
    font-size:20px;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s var(--ease);}
  .fab:active{transform:scale(.9);}
  .fab.safety{background:rgba(255,90,90,.18);border-color:rgba(255,90,90,.4);}
  .fab.phrase{background:var(--glass);}

  /* Slide-up panel */
  .scrim{position:absolute;inset:0;z-index:900;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .4s var(--ease);}
  .scrim.show{opacity:1;pointer-events:auto;}
  .panel{position:absolute;left:0;right:0;bottom:0;z-index:910;background:var(--glass);backdrop-filter:blur(30px) saturate(1.4);
    border-top:1px solid var(--stroke-hi);border-radius:26px 26px 0 0;padding:14px 16px 22px;max-height:78%;overflow-y:auto;
    box-shadow:var(--shadow);transform:translateY(110%);transition:transform .5s var(--ease);}
  .panel.show{transform:translateY(0);}
  .panel h2{font-family:'Sora';font-size:20px;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px;}
  .sos-btn{width:100%;padding:18px;margin-top:14px;border:none;border-radius:var(--r-md);background:linear-gradient(135deg,#ff7676,var(--red));
    color:#fff;font-family:inherit;font-weight:800;font-size:17px;letter-spacing:.5px;cursor:pointer;box-shadow:0 8px 28px rgba(255,90,90,.45);
    display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .2s var(--ease);}
  .sos-btn:active{transform:scale(.97);}
  .safe-tip{display:flex;gap:11px;align-items:flex-start;padding:13px;margin-top:9px;background:rgba(10,12,16,.5);border:1px solid var(--stroke);border-radius:var(--r-md);}
  .safe-tip .si{font-size:18px;}
  .phrase-card{padding:14px;margin-top:9px;background:rgba(10,12,16,.5);border:1px solid var(--stroke);border-radius:var(--r-md);
    display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .phrase-card .fr{font-size:13px;color:var(--txt2);}
  .phrase-card .da{font-family:'Sora';font-size:16px;font-weight:700;margin-top:3px;}
  .phrase-card .play{width:42px;height:42px;border-radius:50%;border:1px solid var(--stroke-hi);background:var(--glass-hi);color:var(--amber);
    font-size:16px;cursor:pointer;flex-shrink:0;transition:transform .15s var(--ease);}
  .phrase-card .play:active{transform:scale(.88);}
  .seg-tabs{display:flex;gap:7px;margin:12px 0;}
  .seg-tabs button{flex:1;padding:9px;border-radius:var(--r-sm);border:1px solid var(--stroke);background:transparent;color:var(--txt3);
    font-family:inherit;font-weight:600;font-size:12px;cursor:pointer;transition:all .25s var(--ease);}
  .seg-tabs button.on{background:var(--glass-hi);border-color:var(--stroke-hi);color:var(--txt);}

  /* Roaming-taxi popup */
  .taxi-pop{padding:4px 2px;min-width:180px;}
  .taxi-pop .tt{font-family:'Sora';font-weight:700;font-size:15px;}
  .taxi-pop .meta{font-size:12px;color:var(--txt2);margin-top:3px;}
  .taxi-pop .seats-mini{display:flex;gap:3px;margin-top:7px;}
  .taxi-pop .sm{width:11px;height:11px;border-radius:3px;background:var(--stroke-hi);}
  .taxi-pop .sm.full{background:var(--amber);}
  .taxi-pop button{width:100%;margin-top:10px;padding:9px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--amber-soft),var(--amber));
    color:#0A0C10;font-family:inherit;font-weight:800;font-size:13px;cursor:pointer;}
  .taxi-pop button:disabled{background:var(--stroke-hi);color:var(--txt3);}
  .leaflet-popup-content-wrapper{background:var(--glass)!important;backdrop-filter:blur(24px) saturate(1.4);border:1px solid var(--stroke-hi);
    border-radius:var(--r-md)!important;color:var(--txt)!important;box-shadow:var(--shadow)!important;}
  .leaflet-popup-tip{background:var(--glass)!important;}
  .leaflet-popup-close-button{color:var(--txt2)!important;}
  .roam-mk{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:20px;
    background:none;border:none;box-shadow:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5)) drop-shadow(0 0 7px var(--amber-glow));
    transition:transform .3s var(--ease);}
  .roam-mk.ghost{filter:drop-shadow(0 2px 4px rgba(0,0,0,.45)) drop-shadow(0 0 6px rgba(255,176,0,.35));}

  /* Smart ride pooling note */
  .smart-note{margin-top:11px;padding:11px 13px;background:rgba(62,123,255,.1);border:1px solid rgba(62,123,255,.3);
    border-radius:var(--r-md);font-size:12.5px;line-height:1.45;color:#c5d6ff;}
  .smart-note b{color:#fff;font-weight:700;}

  /* Ghost toggle switch */
  .ghost-toggle{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:13px;border-top:1px solid var(--stroke);}
  .switch{width:44px;height:26px;border-radius:100px;background:var(--stroke-hi);position:relative;cursor:pointer;transition:background .3s var(--ease);}
  .switch.on{background:linear-gradient(135deg,var(--amber-soft),var(--amber));}
  .switch .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4);transition:transform .3s var(--ease);}
  .switch.on .knob{transform:translateX(18px);}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
<div id="app">
  <div id="splash">
    <div class="splash-logo">
      <img src="logo-dark.svg" alt="TAX!" class="logo-img splash-img">
    </div>
    <div class="splash-bar"><div class="splash-fill"></div></div>
    <div class="splash-tag">Casablanca · transport agréé</div>
  </div>
  <div id="hdr">
    <img src="logo-dark.svg" alt="TAX!" class="logo-img header-img">
    <div style="margin-left:2px;"><div style="font-size:15px;font-weight:700;">Réserver un taxi</div><div class="sub">Casablanca</div></div>
  </div>
  <div id="mapwrap">
    <div id="map"></div>

    <!-- Floating safety + phrasebook buttons -->
    <div class="fab-stack">
      <button class="fab phrase" onclick="openPanel('phrase')" aria-label="Phrases utiles">💬</button>
      <button class="fab safety" onclick="openPanel('safety')" aria-label="Sécurité">🛡️</button>
    </div>

    <div id="sheet"></div>
    <div class="toast" id="toast"></div>

    <!-- Slide-up panel (safety / phrasebook) -->
    <div class="scrim" id="scrim" onclick="closePanel()"></div>
    <div class="panel" id="panel">
      <div class="grab"></div>
      <div id="panelBody"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  {n:"Aéroport Mohammed V",lat:33.3675,lng:-7.5898}
];
function nearestLandmark(lat,lng){
  let best=null,bd=1e9;
  for(const L of LANDMARKS){
    const d=Math.hypot(L.lat-lat,L.lng-lng);
    if(d<bd){bd=d;best=L;}
  }
  // distance in meters (rough) to describe proximity
  const meters=Math.round(bd*111000);
  return {name:best.n, meters};
}
function placeLabel(lat,lng){
  const {name,meters}=nearestLandmark(lat,lng);
  if(meters<120) return name;
  if(meters<700) return `Près de ${name}`;
  return name;
}

// bearing from point a to b, in degrees (0 = north, clockwise)
function bearing(a,b){
  const φ1=a[0]*Math.PI/180,φ2=b[0]*Math.PI/180,Δλ=(b[1]-a[1])*Math.PI/180;
  const y=Math.sin(Δλ)*Math.cos(φ2);
  const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function pickupIcon(angle){
  const arrow = angle==null ? '' :
    `<div class="dir-arrow" style="transform:translate(-50%,-50%) rotate(${angle}deg);">
       <svg width="22" height="22" viewBox="0 0 22 22"><path d="M11 1 L17 13 L11 10 L5 13 Z" fill="#5b91ff" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/></svg>
     </div>`;
  return L.divIcon({className:'',iconSize:[54,54],iconAnchor:[27,27],
    html:`<div class="dir-wrap">${arrow}<div class="dir-dot"></div></div>`});
}
function refreshPickupArrow(){

async function getRoute(a,b){
  try{const u=`https://router.project-osrm.org/route/v1/driving/${a[1]},${a[0]};${b[1]},${b[0]}?overview=full&geometries=geojson`;
    const r=await(await fetch(u)).json();
    if(r.routes&&r.routes[0])return{coords:r.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),distance:r.routes[0].distance};
  }catch(e){}return{coords:[a,b],distance:map.distance(a,b)};
}
let estKm=0;
async function estimate(){
  if(!state.pickup||!state.drop)return;
  const r=await getRoute(state.pickup,state.drop);
  estKm=r.distance/1000;
  if(routeLine)map.removeLayer(routeLine);
  routeLine=L.polyline(r.coords,{color:'#34D17A',weight:4,opacity:.7,dashArray:'6,6'}).addTo(map);
  map.fitBounds(L.latLngBounds([state.pickup,state.drop]).pad(0.3));
  renderSheet();
}
function fareFor(type){const base=7,mult=type==='premium'?1.6:type==='smart'?0.9:1;return Math.max(base,Math.round((base+estKm*DH)*mult));}

async function requestRide(){
  if(!state.pickup||!state.drop)return;
  const fare=fareFor(state.type);
  const {data,error}=await sb.from('rides').insert({
    rider_name:'Rider',
    pickup_name:state.pickupName||'Point de départ',pickup_lat:state.pickup[0],pickup_lng:state.pickup[1],
    drop_name:state.dropName||'Destination',drop_lat:state.drop[0],drop_lng:state.drop[1],
    fare,ride_type:state.type,pax:state.pax,preferred_driver:state.preferredDriver||null,status:'waiting'
  }).select().single();
  if(error){toast('Erreur — réessayez');console.error(error);return;}
  state.ride=data;state.step='waiting';renderSheet();
  toast('Recherche d\'un taxi…');
  // listen for a driver accepting / progressing
  sb.channel('myride-'+data.id).on('postgres_changes',
    {event:'UPDATE',schema:'public',table:'rides',filter:'id=eq.'+data.id},
    payload=>{onRideUpdate(payload.new);}).subscribe();
}

function onRideUpdate(row){
  const prevStatus = state.ride && state.ride.status;
  const prevReroute = state.ride && state.ride.reroute_reason;
  state.ride=row;
  if(row.status==='accepted'&&prevStatus!=='accepted'){state.step='accepted';toast('Taxi en route vers vous !');}
  else if(row.status==='onboard'&&prevStatus!=='onboard'){state.step='onboard';toast('Bon voyage !');}
  else if(row.status==='completed'){state.step='done';toast('Arrivé — merci !');stopTaxiAnim();}
  // live taxi position
  if(row.driver_lat!=null && row.driver_lng!=null){
    moveTaxiTo([row.driver_lat,row.driver_lng]);
  }
  // driver proposed a reroute due to traffic
  if(row.reroute_reason && row.reroute_reason!==prevReroute){
    state.reroute={title:'🚗 Trafic sur votre route',why:row.reroute_reason,saveMin:row.reroute_save_min||3,moneyTxt:'même prix',realRide:true};
    renderReroutePop();
  }
  renderSheet();
}

// smoothly glide the rider's taxi marker toward each reported position
let taxiAnim=null, taxiTarget=null;
function moveTaxiTo(pt){
  if(!taxiMk){
    taxiMk=L.marker(pt,{icon:L.divIcon({className:'',html:'<div class="taxi-mk">🚕</div>',iconSize:[34,34],iconAnchor:[17,17]}),zIndexOffset:1000}).addTo(map);
    taxiMk.setLatLng(pt);
    if(state.pickup) map.fitBounds(L.latLngBounds([pt,state.pickup]).pad(0.4));
    return;
  }
  taxiTarget=pt;
  if(taxiAnim)return; // already gliding
  function glide(){
    const cur=taxiMk.getLatLng();
    const dLat=taxiTarget[0]-cur.lat, dLng=taxiTarget[1]-cur.lng;
    if(Math.abs(dLat)<1e-6&&Math.abs(dLng)<1e-6){taxiAnim=null;return;}
    taxiMk.setLatLng([cur.lat+dLat*0.08, cur.lng+dLng*0.08]);
    taxiAnim=requestAnimationFrame(glide);
  }
  taxiAnim=requestAnimationFrame(glide);
}
function stopTaxiAnim(){if(taxiAnim){cancelAnimationFrame(taxiAnim);taxiAnim=null;}}

// ---- Ghost taxis (demo bots) — scattered near the rider, fully interactable ----
const GHOST_NAMES=["Hassan A.","Rachid M.","Khalid B.","Said O.","Mehdi T.","Nabil F.","Aziz K.","Driss L."];
const GHOST_PLATES=["A-3920","B-1192","A-7754","C-2031","A-5567","B-8890","A-4412","C-6628"];
let ghosts=[];        // {id,name,plate,type,seats,rating,lat,lng,heading,marker}
let ghostTimer=null;

function spawnGhosts(center){
  clearGhosts();
  const n=5+Math.floor(Math.random()*3); // 5-7 taxis
  for(let i=0;i<n;i++){
    // scatter within ~1.2km of the center
    const dLat=(Math.random()-0.5)*0.022, dLng=(Math.random()-0.5)*0.026;
    ghosts.push({
      id:'ghost-'+i,
      name:GHOST_NAMES[i%GHOST_NAMES.length],
      plate:GHOST_PLATES[i%GHOST_PLATES.length],
      type:Math.random()>0.7?'grand':'petit',
      seats:Math.floor(Math.random()*3),          // 0-2 taken
      rating:(4.4+Math.random()*0.6).toFixed(1),
      lat:center[0]+dLat, lng:center[1]+dLng,
      heading:Math.random()*360,
      marker:null
    });
  }
  if(state.showGhosts!==false) renderGhosts();
  if(ghostTimer)clearInterval(ghostTimer);
  ghostTimer=setInterval(roamGhosts,1600);
}
function clearGhosts(){
  ghosts.forEach(g=>{if(g.marker)map.removeLayer(g.marker);});
  ghosts=[];
  if(ghostTimer){clearInterval(ghostTimer);ghostTimer=null;}
}
function roamGhosts(){
  if(state.ghostRiding)return;   // freeze wandering while a ride is in progress
  ghosts.forEach(g=>{
    // gentle wander: occasionally turn, step forward
    if(Math.random()<0.3)g.heading+=(Math.random()-0.5)*70;
    const step=0.0006+Math.random()*0.0005;
    g.lat+=Math.cos(g.heading*Math.PI/180)*step;
    g.lng+=Math.sin(g.heading*Math.PI/180)*step;
    if(g.marker){
      g.marker.setLatLng([g.lat,g.lng]);
      const el=g.marker.getElement?.()?.querySelector('.roam-mk');
      if(el)el.style.transform=`rotate(${g.heading}deg)`;
    }
  });
}
function ghostPopup(g){
  const free=3-g.seats, full=free<=0;
  return `<div class="taxi-pop">
    <div class="tt">🚕 ${g.name}</div>
    <div class="meta">${g.type==='grand'?'Grand Taxi':'Petit Taxi'} · ${g.plate}</div>
    <div class="meta">⭐ ${g.rating} · ${full?'Complet':free+' place'+(free>1?'s':'')+' libre'+(free>1?'s':'')}</div>
    <div class="seats-mini">${[0,1,2].map(i=>`<span class="sm ${i<g.seats?'full':''}"></span>`).join('')}</div>
    <button ${full?'disabled':''} onclick="hailGhost('${g.id}')">${full?'Taxi complet':'Héler ce taxi'}</button>
  </div>`;
}
function renderGhosts(){
  if(!state.showGhosts){clearGhostMarkers();return;}
  ghosts.forEach(g=>{
    if(!g.marker){
      g.marker=L.marker([g.lat,g.lng],{icon:L.divIcon({className:'',html:'<div class="roam-mk ghost">🚕</div>',iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map);

      g.marker.setPopupContent(ghostPopup(g));

}
function clearGhostMarkers(){ ghosts.forEach(g=>{if(g.marker){map.removeLayer(g.marker);g.marker=null;}}); }
window.hailGhost=(id)=>{
  const g=ghosts.find(x=>x.id===id);if(!g)return;
  if(!state.pickup||!state.drop){toast('Définissez d\'abord votre trajet');return;}
  toast(`${g.name} arrive vers vous…`);
  simulateGhostRide(g);

async function simulateGhostRide(g){
  if(g.marker)g.marker.closePopup();
  state.ghostRiding=true;
  state.step='accepted';
  state.ride={fare:fareFor(state.type),ghost:g};
  renderSheet();
  // drive ghost -> pickup
  const r1=await getRoute([g.lat,g.lng],state.pickup);
  driveGhost(g,r1.coords,4500,async()=>{
    toast('À bord — en route');
    state.step='onboard';renderSheet();
    // fetch route WITH alternatives so we can offer a reroute on traffic
    const main=await getRouteAlt(state.pickup,state.drop);
    state.trafficChecked=false;
    driveGhost(g,main.coords,8000,()=>{
      state.step='done';state.ghostRiding=false;renderSheet();
      toast('Arrivé — merci !');
    },(t)=>{
      // ~35% in, hit "traffic" and offer the alternate route (if one exists)
      if(!state.trafficChecked && t>0.33){
        state.trafficChecked=true;
        if(main.alt){ offerReroute(g,main,main.alt); }
      }
    });
  });
}

// OSRM with alternatives
async function getRouteAlt(a,b){
  try{
    const u=`https://router.project-osrm.org/route/v1/driving/${a[1]},${a[0]};${b[1]},${b[0]}?overview=full&geometries=geojson&alternatives=true`;
    const r=await(await fetch(u)).json();
    if(r.routes&&r.routes[0]){
      const m=r.routes[0];
      const alt=r.routes[1]||null;
      return {
        coords:m.geometry.coordinates.map(c=>[c[1],c[0]]),
        duration:m.duration, distance:m.distance,
        alt: alt?{coords:alt.geometry.coordinates.map(c=>[c[1],c[0]]),duration:alt.duration,distance:alt.distance}:null
      };
    }
  }catch(e){}
  return {coords:[a,b],duration:600,distance:5000,alt:null};
}

// reroute offer: pause the cab, show reason + time/money delta, accept/deny
function offerReroute(g,main,alt){
  state.ghostPaused=true;
  // simulate that the MAIN route is now congested: inflate its effective time
  const reasons=[["🚧 Route bloquée plus loin","des travaux bloquent votre route actuelle"],
                 ["🚗 Trafic dense","embouteillage important signalé devant"],
                 ["⛔ Accident signalé","un accident ralentit fortement la circulation"]];
  const [title,why]=reasons[Math.floor(Math.random()*reasons.length)];
  const congestedMain=main.duration*1.6;               // current route now much slower
  const saveSec=Math.max(30,Math.round(congestedMain-alt.duration));
  const saveMin=Math.round(saveSec/60);
  // money: extra distance vs time saved — legal meter reflects actual route
  const kmDelta=((alt.distance-main.distance)/1000);
  const moneyDelta=Math.round(kmDelta*DH);             // + means alt costs a bit more in distance
  const moneyTxt = moneyDelta>0 ? `+${moneyDelta} DH` : (moneyDelta<0?`${moneyDelta} DH`:'même prix');
  state.reroute={g,main,alt,saveMin,moneyTxt,title,why};
  renderReroutePop();
}
function renderReroutePop(){
  const r=state.reroute;if(!r)return;
  let pop=document.getElementById('reroutePop');
  if(!pop){pop=document.createElement('div');pop.id='reroutePop';pop.className='pop landing';document.getElementById('mapwrap').appendChild(pop);}
  pop.innerHTML=`<div class="pop-head" style="color:var(--amber-soft);">${r.title}</div>
    <div style="font-size:13px;color:var(--txt2);line-height:1.4;margin-bottom:12px;">
      Votre chauffeur propose un autre itinéraire car ${r.why}.
      <div style="margin-top:8px;display:flex;gap:16px;">
        <div><div class="lbl">Temps gagné</div><div style="font-family:'Sora';font-weight:800;color:var(--go-soft);font-size:18px;">~${r.saveMin} min</div></div>
        <div><div class="lbl">Tarif</div><div style="font-family:'Sora';font-weight:800;color:var(--amber);font-size:18px;">${r.moneyTxt}</div></div>
      </div>
    </div>
    <div class="pop-act">
      <button class="btn pskip" onclick="denyReroute()">Garder la route</button>
      <button class="btn ptake" style="background:linear-gradient(135deg,var(--amber-soft),var(--amber));color:#0A0C10;" onclick="acceptReroute()">Accepter le détour</button>
    </div>`;
  requestAnimationFrame(()=>pop.classList.add('show'));
}
function closeReroutePop(){const p=document.getElementById('reroutePop');if(p)p.classList.remove('show');}
window.acceptReroute=()=>{
  const r=state.reroute;closeReroutePop();state.ghostPaused=false;
  if(r && r.realRide){ toast('Nouvel itinéraire accepté'); state.reroute=null; return; }
  if(r){ toast('Nouvel itinéraire accepté');
    driveGhost(r.g,r.alt.coords,7000,()=>{state.step='done';state.ghostRiding=false;renderSheet();toast('Arrivé — merci !');});
  }
  state.reroute=null;
};
window.denyReroute=()=>{
  closeReroutePop();state.ghostPaused=false;state.reroute=null;
  toast('Itinéraire conservé');
};

const GHOST_SPEED=1.7;
function driveGhost(g,coords,dur,done,onProg){
  dur=dur*GHOST_SPEED;
  if(routeLine)map.removeLayer(routeLine);
  routeLine=L.polyline(coords,{color:'#FFB000',weight:5,opacity:.8,lineCap:'round'}).addTo(map);
  let segLens=[],total=0;
  for(let i=0;i<coords.length-1;i++){const d=map.distance(coords[i],coords[i+1]);segLens.push(d);total+=d;}
  let elapsed=0,last=performance.now();
  function step(now){
    const dt=now-last;last=now;
    if(!state.ghostPaused)elapsed+=dt;
    let t=Math.min(elapsed/dur,1),target=t*total,acc=0,idx=0;
    while(idx<segLens.length&&acc+segLens[idx]<target){acc+=segLens[idx];idx++;}
    if(idx>=segLens.length)idx=segLens.length-1;
    const segT=segLens[idx]?(target-acc)/segLens[idx]:0;
    const a=coords[idx],b=coords[idx+1]||coords[idx];
    const lat=a[0]+(b[0]-a[0])*segT,lng=a[1]+(b[1]-a[1])*segT;
    g.lat=lat;g.lng=lng;
    if(g.marker)g.marker.setLatLng([lat,lng]);
    routeLine.setLatLngs(coords.slice(idx));
    if(!state.ghostPaused)map.panTo([lat,lng],{animate:true,duration:.3});
    if(onProg&&!state.ghostPaused)onProg(t);
    if(t<1)requestAnimationFrame(step);else done();
  }
  requestAnimationFrame(step);
}


let roamMarkers={};
async function loadRoamingTaxis(){
  const {data}=await sb.from('drivers').select('*').eq('online',true);
  const seen=new Set();
  (data||[]).forEach(d=>{
    if(d.lat==null||d.lng==null)return;
    seen.add(d.id);
    const seats=d.seats_taken||0;
    const full=seats>=3;
    const popup=`<div class="taxi-pop">
      <div class="tt">🚕 ${d.name}</div>
      <div class="meta">${d.taxi_type==='grand'?'Grand Taxi':'Petit Taxi'} · ${d.plate||''}</div>
      <div class="meta">⭐ ${Number(d.rating||5).toFixed(1)} · ${full?'Complet':(3-seats)+' place'+((3-seats)>1?'s':'')+' libre'+((3-seats)>1?'s':'')}</div>
      <div class="seats-mini">${[0,1,2].map(i=>`<span class="sm ${i<seats?'full':''}"></span>`).join('')}</div>
      <button ${full?'disabled':''} onclick="requestSpecificTaxi('${d.id}')">${full?'Taxi complet':'Demander ce taxi'}</button>
    </div>`;
    if(roamMarkers[d.id]){
      roamMarkers[d.id].setLatLng([d.lat,d.lng]).setPopupContent(popup);
    }else{
      const m=L.marker([d.lat,d.lng],{icon:L.divIcon({className:'',html:'<div class="roam-mk">🚕</div>',iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map);
      m.bindPopup(popup);
      roamMarkers[d.id]=m;
    }
  });
  // remove taxis that went offline
  Object.keys(roamMarkers).forEach(id=>{if(!seen.has(id)){map.removeLayer(roamMarkers[id]);delete roamMarkers[id];}});
}
window.requestSpecificTaxi=(driverId)=>{
  if(!state.pickup||!state.drop){toast('Définissez d\'abord votre trajet');closePanel();return;}
  state.preferredDriver=driverId;
  toast('Demande envoyée à ce taxi');
  requestRide();
};
// refresh roaming taxis live + every 5s
sb.channel('roam').on('postgres_changes',{event:'*',schema:'public',table:'drivers'},loadRoamingTaxis).subscribe();
setInterval(loadRoamingTaxis,5000);

renderSheet();
startRiderGPS();
loadRoamingTaxis();
setTimeout(()=>map.invalidateSize(),120);
window.addEventListener('resize',()=>map.invalidateSize());
setTimeout(()=>{const sp=document.getElementById('splash');if(sp)sp.classList.add('gone');},2000);
</script>
