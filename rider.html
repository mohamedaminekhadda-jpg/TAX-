<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TAX! — Rider</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0A0C10; --bg2:#0E1118;
    --glass:rgba(22,26,34,0.72); --glass-hi:rgba(34,40,52,0.66);
    --stroke:rgba(255,255,255,0.07); --stroke-hi:rgba(255,255,255,0.13);
    --amber:#FFB000; --amber-soft:#FFC94D; --amber-glow:rgba(255,176,0,0.45);
    --go:#34D17A; --go-soft:#5BE39A; --go-glow:rgba(52,209,122,0.4);
    --blue:#3E7BFF; --red:#FF5A5A;
    --txt:#F2F5FA; --txt2:#AEB6C4; --txt3:#6B7484;
    --r-lg:22px; --r-md:16px; --r-sm:11px;
    --shadow:0 18px 50px -12px rgba(0,0,0,0.7);
    --ease:cubic-bezier(0.32,0.72,0,1);
    --ease-soft:cubic-bezier(0.4,0,0.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;position:fixed;width:100%;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
  #app{width:100%;max-width:440px;height:100dvh;position:relative;display:grid;grid-template-rows:auto 1fr;
    background:radial-gradient(120% 80% at 50% -10%, #12161F 0%, var(--bg) 55%);overflow:hidden;}
  .disp{font-family:'Sora',sans-serif;font-feature-settings:"tnum" 1;letter-spacing:-0.02em;}
  #hdr{padding:14px 16px;z-index:600;display:flex;align-items:center;gap:9px;
    background:linear-gradient(180deg,rgba(14,17,24,0.9),rgba(10,12,16,0));backdrop-filter:blur(12px);
    opacity:0;transform:translateY(-12px);animation:fadeDown .6s var(--ease) .05s forwards;}
  .mark{font-family:'Sora';font-weight:800;font-size:19px;color:#0A0C10;background:linear-gradient(135deg,var(--amber-soft),var(--amber));
    padding:2px 9px;border-radius:7px;letter-spacing:-0.04em;box-shadow:0 2px 10px var(--amber-glow);}
  .stripe{display:flex;gap:2px;}.stripe i{width:3px;height:16px;border-radius:2px;display:block;opacity:.9;}
  .sub{font-size:11.5px;color:var(--txt3);font-weight:500;}
  #mapwrap{position:relative;overflow:hidden;}
  #map{position:absolute;inset:0;background:var(--bg);}
  .leaflet-container{background:#0b0d12;font-family:inherit;}
  .leaflet-control-zoom{display:none;}
  .me-mk{width:20px;height:20px;background:linear-gradient(135deg,#5b91ff,var(--blue));border:3px solid #fff;border-radius:50%;
    box-shadow:0 4px 14px rgba(62,123,255,.6);}
  .me-mk::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(62,123,255,.4);animation:ping 2s var(--ease-soft) infinite;}
  @keyframes ping{0%{transform:scale(.6);opacity:1;}100%{transform:scale(1.6);opacity:0;}}
  .taxi-mk{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--amber-soft),var(--amber));border:2.5px solid rgba(255,255,255,.9);border-radius:11px;
    box-shadow:0 6px 18px var(--amber-glow);font-size:18px;}
  .pin-mk{width:24px;height:24px;background:linear-gradient(135deg,var(--go-soft),var(--go));border:2.5px solid #fff;border-radius:50% 50% 50% 2px;
    transform:rotate(-45deg);box-shadow:0 4px 12px var(--go-glow);}
  #sheet{position:absolute;left:0;right:0;bottom:0;z-index:600;padding:40px 14px 18px;
    background:linear-gradient(180deg,rgba(10,12,16,0),rgba(10,12,16,.55) 30%,var(--bg) 60%);}
  .card{background:var(--glass);backdrop-filter:blur(28px) saturate(1.3);border:1px solid var(--stroke-hi);border-radius:var(--r-lg);
    padding:18px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.07);animation:sheetRise .55s var(--ease);}
  .grab{width:36px;height:4px;border-radius:100px;background:var(--stroke-hi);margin:-6px auto 14px;}
  .lbl{font-size:10px;color:var(--txt3);letter-spacing:2px;font-weight:600;text-transform:uppercase;}
  .field{background:rgba(10,12,16,.5);border:1px solid var(--stroke);border-radius:var(--r-md);padding:13px 14px;margin-top:9px;
    display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .3s var(--ease);}
  .field:active{border-color:var(--stroke-hi);}
  .field .ic{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .field.pickup .ic{background:var(--amber);box-shadow:0 0 8px var(--amber-glow);}
  .field.drop .ic{background:var(--go);box-shadow:0 0 8px var(--go-glow);}
  .field input{background:transparent;border:none;outline:none;color:var(--txt);font-family:inherit;font-size:15px;width:100%;font-weight:500;}
  .field input::placeholder{color:var(--txt3);font-weight:400;}
  .types{display:flex;gap:8px;margin-top:11px;}
  .tp{flex:1;text-align:center;padding:11px 4px;border-radius:var(--r-md);border:1px solid var(--stroke);cursor:pointer;
    transition:all .3s var(--ease);}
  .tp:active{transform:scale(.97);}
  .tp .n{font-size:12px;font-weight:700;letter-spacing:.3px;}
  .tp .p{font-family:'Sora';font-size:13px;font-weight:700;color:var(--txt3);margin-top:3px;}
  .tp.on.normal{border-color:var(--go);background:rgba(52,209,122,.12);} .tp.on.normal .p{color:var(--go-soft);}
  .tp.on.smart{border-color:var(--blue);background:rgba(62,123,255,.12);} .tp.on.smart .p{color:#8fb0ff;}
  .tp.on.premium{border-color:var(--amber);background:rgba(255,176,0,.12);} .tp.on.premium .p{color:var(--amber-soft);}
  .est{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding:0 2px;}
  .est .f{font-family:'Sora';font-size:27px;font-weight:800;color:var(--amber);letter-spacing:-0.03em;}
  .btn{width:100%;margin-top:14px;padding:16px;border:none;border-radius:var(--r-md);font-family:inherit;font-weight:800;font-size:15px;
    letter-spacing:.3px;cursor:pointer;background:linear-gradient(135deg,var(--amber-soft),var(--amber));color:#0A0C10;
    box-shadow:0 8px 24px var(--amber-glow);transition:transform .2s var(--ease),opacity .3s;}
  .btn:active{transform:scale(.97);}
  .btn:disabled{background:var(--stroke-hi);color:var(--txt3);box-shadow:none;}
  .btn.cancel{background:rgba(255,90,90,.1);border:1px solid rgba(255,90,90,.35);color:var(--red);box-shadow:none;}
  .status-row{display:flex;align-items:center;gap:11px;margin-bottom:7px;}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 0 var(--amber-glow);animation:beacon 1.8s infinite;}
  .pulse.go{background:var(--go);box-shadow:0 0 0 0 var(--go-glow);}
  @keyframes beacon{0%{box-shadow:0 0 0 0 var(--amber-glow);}70%{box-shadow:0 0 0 8px rgba(255,176,0,0);}100%{box-shadow:0 0 0 0 rgba(255,176,0,0);}}
  .meter-big{font-family:'Sora';font-size:36px;font-weight:800;color:var(--amber);letter-spacing:-0.03em;line-height:1;}
  .toast{position:absolute;top:64px;left:50%;transform:translateX(-50%) translateY(-12px);z-index:999;
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);border:1px solid var(--stroke-hi);color:var(--txt);
    padding:11px 18px;border-radius:100px;font-size:13px;font-weight:500;box-shadow:var(--shadow);
    opacity:0;transition:all .4s var(--ease);max-width:86%;text-align:center;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hidden{display:none!important;}
  ::-webkit-scrollbar{width:0;}
  @keyframes sheetRise{from{opacity:0;transform:translateY(28px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <span class="mark">TAX<span style="color:var(--red)">!</span></span>
    <div class="stripe"><i style="background:var(--amber)"></i><i style="background:var(--blue)"></i><i style="background:var(--red)"></i></div>
    <div style="margin-left:2px;"><div style="font-size:15px;font-weight:700;">Réserver un taxi</div><div class="sub">Casablanca</div></div>
  </div>
  <div id="mapwrap">
    <div id="map"></div>
    <div id="sheet"></div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://gazieocibfftbstxefyj.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdhemllb2NpYmZmdGJzdHhlZnlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDAyMDgsImV4cCI6MjA5NjYxNjIwOH0.IrUwdcdCYvKeCoSctJuSPUl1sfZ1U70TRMfkXjW1BAI';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const CENTER=[33.5899,-7.6039];
const DH=10.4;
let state={step:'set',pickup:null,drop:null,settingMode:'pickup',type:'normal',ride:null};

const map=L.map('map',{zoomControl:false,attributionControl:false}).setView(CENTER,14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);
let pickupMk=null,dropMk=null,taxiMk=null,routeLine=null;

let toastT;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),3000);}

// tap map to set pickup, then destination
map.on('click',e=>{
  if(state.step!=='set')return;
  const pt=[e.latlng.lat,e.latlng.lng];
  if(state.settingMode==='pickup'){
    state.pickup=pt;
    if(pickupMk)map.removeLayer(pickupMk);
    pickupMk=L.marker(pt,{icon:L.divIcon({className:'',html:'<div class="me-mk"></div>',iconSize:[18,18],iconAnchor:[9,9]})}).addTo(map);
    state.settingMode='drop';toast('Maintenant, touchez votre destination');
  }else{
    state.drop=pt;
    if(dropMk)map.removeLayer(dropMk);
    dropMk=L.marker(pt,{icon:L.divIcon({className:'',html:'<div class="pin-mk"></div>',iconSize:[22,22],iconAnchor:[11,22]})}).addTo(map);
  }
  estimate();renderSheet();
});

async function getRoute(a,b){
  try{const u=`https://router.project-osrm.org/route/v1/driving/${a[1]},${a[0]};${b[1]},${b[0]}?overview=full&geometries=geojson`;
    const r=await(await fetch(u)).json();
    if(r.routes&&r.routes[0])return{coords:r.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),distance:r.routes[0].distance};
  }catch(e){}return{coords:[a,b],distance:map.distance(a,b)};
}
let estKm=0;
async function estimate(){
  if(!state.pickup||!state.drop)return;
  const r=await getRoute(state.pickup,state.drop);
  estKm=r.distance/1000;
  if(routeLine)map.removeLayer(routeLine);
  routeLine=L.polyline(r.coords,{color:'#34D17A',weight:4,opacity:.7,dashArray:'6,6'}).addTo(map);
  map.fitBounds(L.latLngBounds([state.pickup,state.drop]).pad(0.3));
  renderSheet();
}
function fareFor(type){const base=7,mult=type==='premium'?1.6:type==='smart'?0.9:1;return Math.max(base,Math.round((base+estKm*DH)*mult));}

async function requestRide(){
  if(!state.pickup||!state.drop)return;
  const fare=fareFor(state.type);
  const {data,error}=await sb.from('rides').insert({
    rider_name:'Rider',
    pickup_name:'Point de départ',pickup_lat:state.pickup[0],pickup_lng:state.pickup[1],
    drop_name:'Destination',drop_lat:state.drop[0],drop_lng:state.drop[1],
    fare,ride_type:state.type,status:'waiting'
  }).select().single();
  if(error){toast('Erreur — réessayez');console.error(error);return;}
  state.ride=data;state.step='waiting';renderSheet();
  toast('Recherche d\'un taxi…');
  // listen for a driver accepting / progressing
  sb.channel('myride-'+data.id).on('postgres_changes',
    {event:'UPDATE',schema:'public',table:'rides',filter:'id=eq.'+data.id},
    payload=>{onRideUpdate(payload.new);}).subscribe();
}

function onRideUpdate(row){
  const prevStatus = state.ride && state.ride.status;
  state.ride=row;
  if(row.status==='accepted'&&prevStatus!=='accepted'){state.step='accepted';toast('Taxi en route vers vous !');}
  else if(row.status==='onboard'&&prevStatus!=='onboard'){state.step='onboard';toast('Bon voyage !');}
  else if(row.status==='completed'){state.step='done';toast('Arrivé — merci !');stopTaxiAnim();}
  // live taxi position
  if(row.driver_lat!=null && row.driver_lng!=null){
    moveTaxiTo([row.driver_lat,row.driver_lng]);
  }
  renderSheet();
}

// smoothly glide the rider's taxi marker toward each reported position
let taxiAnim=null, taxiTarget=null;
function moveTaxiTo(pt){
  if(!taxiMk){
    taxiMk=L.marker(pt,{icon:L.divIcon({className:'',html:'<div class="taxi-mk">🚕</div>',iconSize:[34,34],iconAnchor:[17,17]}),zIndexOffset:1000}).addTo(map);
    taxiMk.setLatLng(pt);
    if(state.pickup) map.fitBounds(L.latLngBounds([pt,state.pickup]).pad(0.4));
    return;
  }
  taxiTarget=pt;
  if(taxiAnim)return; // already gliding
  function glide(){
    const cur=taxiMk.getLatLng();
    const dLat=taxiTarget[0]-cur.lat, dLng=taxiTarget[1]-cur.lng;
    if(Math.abs(dLat)<1e-6&&Math.abs(dLng)<1e-6){taxiAnim=null;return;}
    taxiMk.setLatLng([cur.lat+dLat*0.15, cur.lng+dLng*0.15]);
    taxiAnim=requestAnimationFrame(glide);
  }
  taxiAnim=requestAnimationFrame(glide);
}
function stopTaxiAnim(){if(taxiAnim){cancelAnimationFrame(taxiAnim);taxiAnim=null;}}

async function cancelRide(){
  if(state.ride)await sb.from('rides').update({status:'cancelled'}).eq('id',state.ride.id);
  resetAll();
}
function resetAll(){
  state={step:'set',pickup:null,drop:null,settingMode:'pickup',type:'normal',ride:null};
  [pickupMk,dropMk,routeLine,taxiMk].forEach(m=>{if(m)map.removeLayer(m);});
  pickupMk=dropMk=routeLine=taxiMk=null;estKm=0;
  map.setView(CENTER,14);renderSheet();
}
window.requestRide=requestRide;window.cancelRide=cancelRide;window.resetAll=resetAll;
window.setType=t=>{state.type=t;renderSheet();};
window.setMode=m=>{state.settingMode=m;toast(m==='pickup'?'Touchez votre position':'Touchez votre destination');};

function renderSheet(){
  const s=document.getElementById('sheet');
  if(state.step==='set'){
    const ready=state.pickup&&state.drop;
    s.innerHTML=`<div class="card">
      <div class="lbl">Votre trajet</div>
      <div class="field pickup" onclick="setMode('pickup')"><span class="ic"></span>
        <input readonly placeholder="Touchez la carte pour le départ" value="${state.pickup?'Point de départ défini':''}"></div>
      <div class="field drop" onclick="setMode('drop')"><span class="ic"></span>
        <input readonly placeholder="Touchez la carte pour la destination" value="${state.drop?'Destination définie':''}"></div>
      <div class="types">
        ${['normal','smart','premium'].map(t=>`<div class="tp ${t} ${state.type===t?'on':''}" onclick="setType('${t}')">
          <div class="n">${t.toUpperCase()}</div><div class="p">${ready?fareFor(t)+' DH':'—'}</div></div>`).join('')}
      </div>
      ${ready?`<div class="est"><span class="sub">${estKm.toFixed(1)} km estimés</span><span class="f">${fareFor(state.type)} DH</span></div>`:''}
      <button class="btn" ${ready?'':'disabled'} onclick="requestRide()">${ready?'Commander le taxi':'Touchez la carte pour commencer'}</button>
    </div>`;
  }else if(state.step==='waiting'){
    s.innerHTML=`<div class="card">
      <div class="status-row"><div class="pulse"></div><div style="font-size:17px;font-weight:700;">Recherche d'un taxi…</div></div>
      <div class="sub">Diffusion aux taxis à proximité</div>
      <div class="est"><span class="sub">Tarif estimé</span><span class="f">${state.ride.fare} DH</span></div>
      <button class="btn cancel" onclick="cancelRide()">ANNULER</button>
    </div>`;
  }else if(state.step==='accepted'||state.step==='onboard'){
    s.innerHTML=`<div class="card">
      <div class="status-row"><div class="pulse go"></div>
        <div style="font-size:17px;font-weight:700;">${state.step==='accepted'?'Taxi en route vers vous':'En route — compteur actif'}</div></div>
      <div class="lbl" style="margin-top:10px;">COMPTEUR</div>
      <div class="meter-big">${state.ride.fare} DH</div>
      <div class="sub" style="margin-top:4px;">Tarif transparent · vérifié par GPS</div>
      <button class="btn cancel" onclick="cancelRide()">ANNULER</button>
    </div>`;
  }else if(state.step==='done'){
    s.innerHTML=`<div class="card" style="text-align:center;">
      <div style="font-size:34px;">✅</div>
      <div style="font-size:18px;font-weight:700;margin-top:6px;">Course terminée</div>
      <div class="meter-big" style="margin-top:8px;">${state.ride.fare} DH</div>
      <button class="btn" onclick="resetAll()">NOUVELLE COURSE</button>
    </div>`;
  }
}
renderSheet();
setTimeout(()=>map.invalidateSize(),120);
window.addEventListener('resize',()=>map.invalidateSize());
</script>
</body>
</html>
